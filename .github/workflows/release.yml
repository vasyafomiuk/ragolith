name: Release

# Publishes ragolith to npm via Trusted Publishing (OIDC).
#
# Two ways to fire it:
#   A) Push a v* tag (the canonical release flow):
#        git tag v0.1.0 && git push origin v0.1.0
#   B) Manual run from the Actions tab (GitHub → Actions → Release →
#      "Run workflow"). Whatever is in package.json's "version" field at
#      that moment is what gets published.
#
# Either way the workflow:
#   1. Runs the full local pipeline (lint + typecheck + coverage + build).
#   2. npm publish --provenance --access public
#   3. npm exchanges the workflow's OIDC token for a short-lived publish
#      credential — no NPM_TOKEN secret needed.
#   4. The published tarball carries a provenance attestation linking it
#      back to this exact commit + workflow run.
#
# Setup (one-time):
#   - On npm: Settings → Trusted Publishers → Add → GitHub Actions, with
#     package: ragolith, owner: vasyafomiuk, repo: ragolith, workflow:
#     release.yml. (Pre-configuration is supported — the package doesn't
#     need to exist yet.)
#   - In this repo: the `id-token: write` permission must be granted to
#     the workflow (already configured below) and the package must be
#     published from a public repo (this one is).
#
# No NPM_TOKEN secret is required.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run the pipeline + npm pack but skip the actual publish'
        type: boolean
        default: false

permissions:
  contents: read
  # id-token is required for npm provenance (OIDC).
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # `prepublishOnly` would re-run this, but failing early on CI surfaces
      # any breakage in the run page before the publish step starts.
      - name: Verify (check:layers, lint, format:check, typecheck, coverage, build)
        run: npm run all

      # Dry-run path: just pack and show what would ship. Useful when fired
      # via workflow_dispatch with dry_run=true to sanity-check changes
      # without actually publishing.
      - name: Dry-run pack
        if: ${{ inputs.dry_run == true }}
        run: npm pack --dry-run

      # Trusted Publishing requires npm CLI >= 11.5.1. setup-node@v4 with
      # Node 22 ships a recent npm, but pin upward defensively in case the
      # runner image lags.
      - name: Ensure npm is recent enough for Trusted Publishing
        if: ${{ inputs.dry_run != true }}
        run: npm install --global npm@latest

      - name: Publish to npm (Trusted Publishing via OIDC)
        if: ${{ inputs.dry_run != true }}
        # npm CLI exchanges the workflow's OIDC token for a publish
        # credential. No NODE_AUTH_TOKEN env, no NPM_TOKEN secret.
        run: npm publish --provenance --access public
