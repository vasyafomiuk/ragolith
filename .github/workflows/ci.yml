name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # weaviate-client wants Node 22, but the codebase runs fine on 20 — keep both in the matrix.
        node-version: ['20', '22']
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check layer boundaries
        run: npm run check:layers

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Test + coverage
        run: npm run coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-node${{ matrix.node-version }}
          path: coverage/
          retention-days: 7

      - name: Build
        run: npm run build

  integration:
    # End-to-end test against a real Weaviate + embedder stack via docker compose.
    # Only runs after the unit pipeline is green, and only on Node 22 (saves
    # runner minutes; the t2v-transformers image is ~500MB).
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Start Weaviate stack
        run: docker compose up -d

      - name: Run integration tests
        # The test itself polls /v1/.well-known/ready up to 3 min, so no
        # separate wait step is needed here.
        run: npm run test:integration

      - name: Show stack logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v
