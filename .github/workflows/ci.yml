name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # weaviate-client wants Node 22, but the codebase runs fine on 20 — keep both in the matrix.
        node-version: ['20', '22']
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check layer boundaries
        run: npm run check:layers

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        # Build before tests so test smoke-checks that spawn dist/ binaries
        # (e.g. tests/cli/init.test.ts) find the compiled output.
        run: npm run build

      - name: Run unit tests
        # Fast pass with no coverage instrumentation — fails the build on any
        # actual test failure, before the slower coverage step runs.
        run: npm test

      - name: Coverage gate
        # Re-runs the same tests under c8 and enforces the thresholds in
        # .c8rc.json. Separated so the CI page attributes a coverage drop
        # vs a test failure to distinct steps.
        run: npm run coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-node${{ matrix.node-version }}
          path: coverage/
          retention-days: 7

  integration:
    # End-to-end test against a real Weaviate + embedder stack via docker compose.
    # Only runs after the unit pipeline is green, and only on Node 22 (saves
    # runner minutes; the t2v-transformers image is ~500MB).
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Free runner disk
        # GitHub-hosted runners have ~14GB free on /. The t2v image is ~6GB
        # extracted; deleting the preinstalled Android SDK + .NET + GHC etc.
        # buys us 30+ GB of headroom and takes ~30s.
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          df -h /

      - name: Install deps + pull Docker images in parallel
        # Image pull is the integration job's biggest wallclock cost (~90s
        # cold). Run it concurrently with `npm ci` in the same shell — each
        # background process must be waited on inside the same step because
        # GH Actions steps don't share shells.
        run: |
          docker compose -f docker-compose.integration.yml pull --quiet &
          PULL_PID=$!
          npm ci
          wait $PULL_PID

      - name: Build
        run: npm run build

      - name: Start Weaviate (slim integration stack)
        # docker-compose.integration.yml drops the reranker container — the
        # integration tests set rerankerEnabled:false so it's unused, and the
        # image is too large for the runner's disk.
        run: docker compose -f docker-compose.integration.yml up -d

      - name: Run integration tests
        # The test itself polls /v1/.well-known/ready up to 3 min, so no
        # separate wait step is needed here.
        run: npm run test:integration

      - name: Show stack logs on failure
        if: failure()
        run: docker compose -f docker-compose.integration.yml logs

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.integration.yml down -v
