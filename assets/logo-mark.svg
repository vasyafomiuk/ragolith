<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-labelledby="ragolith-title ragolith-desc">
  <title id="ragolith-title">ragolith</title>
  <desc id="ragolith-desc">A black monolith standing on a grey lunar surface dotted with craters — a play on the lunar regolith and the "-lith" in the project name.</desc>

  <!-- Lunar disk -->
  <circle cx="128" cy="128" r="116" fill="#E2E8F0"/>
  <circle cx="128" cy="128" r="116" fill="none" stroke="#CBD5E1" stroke-width="2"/>

  <!-- Craters: lighter rim + darker basin gives depth without a gradient. -->
  <g>
    <circle cx="72" cy="88" r="14" fill="#CBD5E1"/>
    <circle cx="74" cy="90" r="10" fill="#94A3B8"/>

    <circle cx="194" cy="146" r="17" fill="#CBD5E1"/>
    <circle cx="196" cy="148" r="12" fill="#94A3B8"/>

    <circle cx="98" cy="196" r="10" fill="#CBD5E1"/>
    <circle cx="99" cy="197" r="7" fill="#94A3B8"/>
  </g>

  <!-- Retrieval lines: the monolith querying the surface — a quiet nod to RAG. -->
  <g stroke="#64748B" stroke-width="1.5" opacity="0.45" stroke-linecap="round" fill="none">
    <line x1="118" y1="118" x2="84"  y2="96"/>
    <line x1="140" y1="138" x2="180" y2="144"/>
    <line x1="124" y1="172" x2="102" y2="188"/>
  </g>

  <!-- Monolith: tilted slab, 2001-style. Drawn last so it sits on top. -->
  <g transform="rotate(-8 128 128)">
    <rect x="119" y="46" width="18" height="124" rx="1" fill="#0F172A"/>
    <!-- Subtle left edge highlight gives the slab dimensionality. -->
    <rect x="119" y="46" width="3"  height="124" rx="1" fill="#1E293B"/>
  </g>
</svg>
