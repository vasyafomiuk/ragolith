<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 256" width="880" height="256" role="img" aria-labelledby="ragolith-title ragolith-desc">
  <title id="ragolith-title">ragolith</title>
  <desc id="ragolith-desc">Dark-mode variant of the ragolith logo: the same lunar mark, with light wordmark text for use on dark backgrounds.</desc>

  <!-- ===== Icon ===== -->
  <!-- Mark stays the same — a grey moon with a darker monolith reads on both light and dark backgrounds. -->
  <g>
    <circle cx="128" cy="128" r="116" fill="#E2E8F0"/>
    <circle cx="128" cy="128" r="116" fill="none" stroke="#CBD5E1" stroke-width="2"/>

    <g>
      <circle cx="72"  cy="88"  r="14" fill="#CBD5E1"/>
      <circle cx="74"  cy="90"  r="10" fill="#94A3B8"/>
      <circle cx="194" cy="146" r="17" fill="#CBD5E1"/>
      <circle cx="196" cy="148" r="12" fill="#94A3B8"/>
      <circle cx="98"  cy="196" r="10" fill="#CBD5E1"/>
      <circle cx="99"  cy="197" r="7"  fill="#94A3B8"/>
    </g>

    <g stroke="#64748B" stroke-width="1.5" opacity="0.45" stroke-linecap="round" fill="none">
      <line x1="118" y1="118" x2="84"  y2="96"/>
      <line x1="140" y1="138" x2="180" y2="144"/>
      <line x1="124" y1="172" x2="102" y2="188"/>
    </g>

    <g transform="rotate(-8 128 128)">
      <rect x="119" y="46" width="18" height="124" rx="1" fill="#0F172A"/>
      <rect x="119" y="46" width="3"  height="124" rx="1" fill="#1E293B"/>
    </g>
  </g>

  <!-- ===== Wordmark (light text for dark backgrounds) ===== -->
  <text x="288" y="172"
        font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="140" font-weight="600" letter-spacing="-4" fill="#F1F5F9">ragolith</text>

  <text x="290" y="206"
        font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
        font-size="20" font-weight="400" letter-spacing="0" fill="#94A3B8">RAG over code · served via MCP</text>
</svg>
